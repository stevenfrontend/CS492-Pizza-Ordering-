<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Palace - Admin</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f3f4f6; margin: 0; }
       
        .admin-header {
            background: #1f2937;
            color: white;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            height: 65px;
        }
       
        .sidebar {
            width: 210px;
            background: #1f2937;
            color: white;
            position: fixed;
            top: 65px;
            left: 0;
            bottom: 0;
            padding: 20px 0;
        }
       
        .main-content {
            margin-left: 220px;
            margin-top: 85px;
            padding: 30px;
        }
        .dashboard-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .summary-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        .summary-card h3 { margin: 0 0 8px 0; font-size: 15px; color: #6b7280; }
        .summary-card .value { font-size: 28px; font-weight: bold; color: #1f2937; }
        .orders-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .orders-table th, .orders-table td { padding: 14px 18px; text-align: left; border-bottom: 1px solid #eee; }
        .orders-table th { background: #f9fafb; }
       
        .status { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-preparing { background: #dbeafe; color: #1e40af; }
        .status-ready { background: #d1fae5; color: #065f46; }
        .status-delivered { background: #e0e7ff; color: #3730a3; }
       
        .refresh-btn { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 15px; margin-bottom: 15px; }
        .update-btn { background: #d32f2f; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 14px; }
       
        .status-modal, .logout-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; align-items: center;
            justify-content: center; z-index: 2000;
        }
        .modal-content {
            background: white; padding: 25px 30px; border-radius: 12px;
            width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        /* Nice Logout Modal Styling */
        .logout-modal-content {
            text-align: center;
        }
        .logout-modal-content h3 {
            margin-top: 0;
            color: #1f2937;
        }
        .logout-modal-content p {
            color: #555;
            margin-bottom: 25px;
        }
        .logout-modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn-logout-cancel {
            background: #6b7280;
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-logout-confirm {
            background: #ef4444;
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <h1>Pizza Palace - Admin</h1>
        <div style="margin-right: 60px;">
            <span>Welcome, Admin</span>
            <button onclick="showLogoutModal()" style="background:#ef4444; color:white; border:none; padding:8px 16px; border-radius:6px; margin-left:15px; cursor:pointer;">Logout</button>
        </div>
    </header>
    <aside class="sidebar">
        <nav>
            <ul style="list-style:none; padding:0; margin:0; padding-top: 60px;">
                <li><a href="admin.html" onclick="loadOrders(); return false;" style="color:white; display:block; padding:12px 25px; text-decoration:none; background:#374151;">Dashboard</a></li>
                <li><a href="#orders-section" style="color:white; display:block; padding:12px 25px; text-decoration:none;">Orders</a></li>
            </ul>
        </nav>
    </aside>
    <main class="main-content">
       
        <h2 style="margin-bottom:15px;">Dashboard Overview</h2>
        <div class="dashboard-summary" id="dashboard-summary"></div>
        <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh Orders</button>
        <h1 id="orders-section" style="margin-bottom:20px;">Orders</h1>
        <table class="orders-table">
            <thead>
                <tr>
                    <th>Order #</th>
                    <th>Customer</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="orders-table-body"></tbody>
        </table>
    </main>

    <!-- Status Modal (Made more professional) -->
    <div id="statusModal" class="status-modal">
        <div class="modal-content" style="text-align: center;">
            <h3 style="margin-top: 0; color: #1f2937;">Update Status</h3>
            <p id="modalOrderId" style="font-weight: bold; color: #374151; margin-bottom: 20px;"></p>
           
            <select id="statusSelect" style="width: 100%; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 25px;">
                <option value="Pending">Pending</option>
                <option value="Preparing">Preparing</option>
                <option value="Ready">Ready</option>
                <option value="Delivered">Delivered</option>
            </select>

            <div style="display: flex; gap: 15px; justify-content: center;">
                <button class="btn-logout-cancel" onclick="closeStatusModal()">Cancel</button>
                <button class="btn-logout-confirm" onclick="confirmStatusUpdate()">Update</button>
            </div>
        </div>
    </div>

    <!-- Nice Logout Modal -->
    <div id="logoutModal" class="logout-modal">
        <div class="modal-content logout-modal-content">
            <h3>Logout</h3>
            <p>Are you sure you want to logout and return to the customer site?</p>
            <div class="logout-modal-buttons">
                <button class="btn-logout-cancel" onclick="closeLogoutModal()">Cancel</button>
                <button class="btn-logout-confirm" onclick="performLogout()">Yes, Logout</button>
            </div>
        </div>
    </div>
    
     <script>
    // === S2-08 RBAC Protection ===
    if (!sessionStorage.getItem("isAdmin")) {
        showAccessDeniedToast();
        setTimeout(() => {
            window.location.href = "index.html";
        }, 2500);
    }

    function showAccessDeniedToast() {
        const toast = document.createElement("div");
        toast.style.cssText = `
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: #ef4444; color: white; padding: 16px 28px; border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); z-index: 99999; font-size: 16px;
            text-align: center; min-width: 300px;
        `;
        toast.textContent = "Access Denied. Please log in through the main site.";
        document.body.appendChild(toast);

        setTimeout(() => toast.remove(), 2500);
    }

    let currentUpdateIndex = null;

        function updateDashboardSummary(orders) {
            const container = document.getElementById("dashboard-summary");
            container.innerHTML = "";
            let totalOrders = orders.length;
            let totalRevenue = orders.reduce((sum, o) => sum + (o.total || 0), 0);
            let pending = 0, preparing = 0, ready = 0, delivered = 0;
            orders.forEach(order => {
                if (order.status === "Pending") pending++;
                else if (order.status === "Preparing") preparing++;
                else if (order.status === "Ready") ready++;
                else if (order.status === "Delivered") delivered++;
            });
            const cards = [
                { title: "Total Orders", value: totalOrders },
                { title: "Total Revenue", value: "$" + totalRevenue.toFixed(2) },
                { title: "Pending", value: pending },
                { title: "Preparing", value: preparing },
                { title: "Ready", value: ready },
                { title: "Delivered", value: delivered }
            ];
            cards.forEach(card => {
                const div = document.createElement("div");
                div.className = "summary-card";
                div.innerHTML = `<h3>${card.title}</h3><div class="value">${card.value}</div>`;
                container.appendChild(div);
            });
        }

        function loadOrders() {
            const tbody = document.getElementById("orders-table-body");
            tbody.innerHTML = "";
            let orders = JSON.parse(localStorage.getItem("pizzaOrders")) || [];
            updateDashboardSummary(orders);
            if (orders.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px; color:#666;">No orders yet.</td></tr>`;
                return;
            }
            orders.forEach((order, index) => {
                let statusClass = "status-pending";
                if (order.status === "Preparing") statusClass = "status-preparing";
                else if (order.status === "Ready") statusClass = "status-ready";
                else if (order.status === "Delivered") statusClass = "status-delivered";
                let itemsText = order.items.map(item => `${item.quantity || 1}× ${item.name}`).join(", ");
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td><strong>${order.id}</strong></td>
                    <td>${order.customer}</td>
                    <td style="max-width: 420px;">${itemsText}</td>
                    <td><strong>$${order.total.toFixed(2)}</strong></td>
                    <td><span class="status ${statusClass}">${order.status}</span></td>
                    <td>${order.date}</td>
                    <td><button class="update-btn" data-index="${index}">Update Status</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        function openStatusModal(index) {
            let orders = JSON.parse(localStorage.getItem("pizzaOrders")) || [];
            const order = orders[index];
            currentUpdateIndex = index;
            document.getElementById("modalOrderId").textContent = order.id;
            document.getElementById("statusSelect").value = order.status;
            document.getElementById("statusModal").style.display = "flex";
        }

        function closeStatusModal() {
            document.getElementById("statusModal").style.display = "none";
        }

        function confirmStatusUpdate() {
            if (currentUpdateIndex === null) return;
            let orders = JSON.parse(localStorage.getItem("pizzaOrders")) || [];
            orders[currentUpdateIndex].status = document.getElementById("statusSelect").value;
            localStorage.setItem("pizzaOrders", JSON.stringify(orders));
            closeStatusModal();
            loadOrders();
        }

        function showLogoutModal() {
            document.getElementById("logoutModal").style.display = "flex";
        }

        function closeLogoutModal() {
            document.getElementById("logoutModal").style.display = "none";
        }

        function performLogout() {
            window.location.href = "index.html";
        }

        window.onload = function() {
            loadOrders();
            document.getElementById("orders-table-body").addEventListener("click", function(e) {
                if (e.target.classList.contains("update-btn")) {
                    const index = parseInt(e.target.getAttribute("data-index"));
                    openStatusModal(index);
                }
            });
        };
    </script>
</body>
</html>
