<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Palace - Admin</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f3f4f6; 
            margin: 0; 
        }
        .admin-header { 
            background-color: #1f2937; 
            color: white; 
            padding: 18px 35px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: fixed; 
            width: 100%; 
            top: 0; 
            left: 0;
            z-index: 1000;
            height: 65px;
        }
        .sidebar { 
            width: 240px; 
            background-color: #1f2937; 
            color: white; 
            position: fixed; 
            top: 65px; 
            left: 0; 
            bottom: 0; 
            padding: 20px 0; 
        }
        .main-content { 
            margin-left: 240px; 
            margin-top: 85px; 
            padding: 30px; 
        }
        .orders-table { 
            width: 100%; 
            border-collapse: collapse; 
            background-color: white; 
            border-radius: 10px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
        }
        .orders-table th, .orders-table td { 
            padding: 14px 18px; 
            text-align: left; 
            border-bottom: 1px solid #eee; 
        }
        .orders-table th { 
            background-color: #f9fafb; 
        }
        .status { 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 600; 
        }
        .status-pending { background-color: #fef3c7; color: #92400e; }
        .status-preparing { background-color: #dbeafe; color: #1e40af; }
        .status-ready { background-color: #d1fae5; color: #065f46; }
        .status-delivered { background-color: #e0e7ff; color: #3730a3; }
        
        .refresh-btn { 
            background-color: #3b82f6; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 15px;
            margin-bottom: 15px;
        }
        .update-btn { 
            background-color: #d32f2f; 
            color: white; 
            border: none; 
            padding: 8px 14px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px;
        }

        /* Custom Status Modal */
        .status-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .status-modal-content {
            background: white;
            padding: 25px 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .status-modal-content h3 {
            margin-top: 0;
            color: #1f2937;
        }
        .status-modal-content select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin: 15px 0;
        }
        .status-modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 10px;
        }
        .status-modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }
        .btn-cancel { background: #6b7280; color: white; }
        .btn-confirm { background: #d32f2f; color: white; }
    </style>
</head>
<body>

    <header class="admin-header">
        <h1>Pizza Palace - Admin</h1>
        <div>
            <span>Welcome, Admin</span>
            <button onclick="logout()" style="background:#ef4444; color:white; border:none; padding:8px 16px; border-radius:6px; margin-left:15px; cursor:pointer;">Logout</button>
        </div>
    </header>

    <aside class="sidebar">
        <nav>
            <ul style="list-style:none; padding:0; margin:0;">
                <li><a href="admin.html" style="color:white; display:block; padding:12px 25px; text-decoration:none; background:#374151;">Dashboard</a></li>
                <li><a href="#" style="color:white; display:block; padding:12px 25px; text-decoration:none;">Orders</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <button id="refreshBtn" class="refresh-btn">🔄 Refresh Orders</button>
        <h1 style="margin-bottom:20px;">Orders</h1>

        <table class="orders-table">
            <thead>
                <tr>
                    <th>Order #</th>
                    <th>Customer</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="orders-table-body"></tbody>
        </table>
    </main>

    <!-- Custom Status Update Modal -->
    <div id="statusModal" class="status-modal">
        <div class="status-modal-content">
            <h3>Update Status</h3>
            <p id="modalOrderId" style="font-weight: bold; color: #374151;"></p>
            
            <select id="statusSelect">
                <option value="Pending">Pending</option>
                <option value="Preparing">Preparing</option>
                <option value="Ready">Ready</option>
                <option value="Delivered">Delivered</option>
            </select>

            <div class="status-modal-buttons">
                <button class="btn-cancel" onclick="closeStatusModal()">Cancel</button>
                <button class="btn-confirm" onclick="confirmStatusUpdate()">Update</button>
            </div>
        </div>
    </div>

    <script>
        let currentUpdateIndex = null;

        function loadOrders() {
            console.log("✅ Refresh button clicked - loading orders");
            const tbody = document.getElementById("orders-table-body");
            tbody.innerHTML = "";

            let orders = JSON.parse(localStorage.getItem("pizzaOrders")) || [];

            if (orders.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px; color:#666;">No orders yet. Place an order from the main site!</td></tr>`;
                return;
            }

            orders.forEach((order, index) => {
                let statusClass = "status-pending";
                if (order.status === "Preparing") statusClass = "status-preparing";
                else if (order.status === "Ready") statusClass = "status-ready";
                else if (order.status === "Delivered") statusClass = "status-delivered";

                let itemsText = order.items.map(item => `${item.quantity || 1}× ${item.name}`).join(", ");

                const row = document.createElement("tr");
                row.innerHTML = `
                    <td><strong>${order.id}</strong></td>
                    <td>${order.customer}</td>
                    <td style="max-width: 420px;">${itemsText}</td>
                    <td><strong>$${order.total.toFixed(2)}</strong></td>
                    <td><span class="status ${statusClass}">${order.status}</span></td>
                    <td>${order.date}</td>
                    <td>
                        <button class="update-btn" data-index="${index}">Update Status</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Open nice modal instead of ugly prompt
        function openStatusModal(index) {
            let orders = JSON.parse(localStorage.getItem("pizzaOrders")) || [];
            const order = orders[index];
            
            currentUpdateIndex = index;
            document.getElementById("modalOrderId").textContent = order.id;
            document.getElementById("statusSelect").value = order.status;
            document.getElementById("statusModal").style.display = "flex";
        }

        function closeStatusModal() {
            document.getElementById("statusModal").style.display = "none";
        }

        function confirmStatusUpdate() {
            if (currentUpdateIndex === null) return;

            let orders = JSON.parse(localStorage.getItem("pizzaOrders")) || [];
            const newStatus = document.getElementById("statusSelect").value;

            orders[currentUpdateIndex].status = newStatus;
            localStorage.setItem("pizzaOrders", JSON.stringify(orders));

            closeStatusModal();
            loadOrders();
            alert("✅ Status updated successfully!");
        }

        function logout() {
            if (confirm("Logout and return to customer site?")) {
                window.location.href = "index.html";
            }
        }

        // Initialize everything when page loads
        window.onload = function() {
            loadOrders();

            // Refresh button
            const refreshBtn = document.getElementById("refreshBtn");
            if (refreshBtn) {
                refreshBtn.addEventListener("click", loadOrders);
            }

            // Update Status buttons (event delegation)
            const tbody = document.getElementById("orders-table-body");
            tbody.addEventListener("click", function(e) {
                if (e.target.classList.contains("update-btn")) {
                    const index = parseInt(e.target.getAttribute("data-index"));
                    openStatusModal(index);
                }
            });
        };
    </script>

</body>
</html>
