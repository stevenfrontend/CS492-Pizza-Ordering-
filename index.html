<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Palace - Online Ordering</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Pizza Palace</h1>
        <p>Delicious pizzas delivered hot!</p>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h2>Fresh. Hot. Delicious.</h2>
            <p>Order your favorite pizza in just a few clicks</p>
            <a href="#menu" class="btn-hero">Browse Menu</a>
        </div>
    </section>

    <!-- Navigation -->
    <nav>
        <a href="index.html">Menu</a>
        <a href="#" onclick="showCart()">Cart (0)</a>
        <a href="#" onclick="checkAdminAccess(); return false;">Admin Dashboard</a>
    </nav>

    <!-- Main Content -->
    <main id="menu">
        <h2>Our Menu</h2>
        <div id="menu-container">
            <!-- Pizza cards appear here via JS -->
        </div>
    </main>

    <!-- Admin Access Modal -->
    <div id="adminAccessModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 3000;">
        <div style="background: white; padding: 32px 40px; border-radius: 16px; width: 360px; max-width: 92%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
            
            <h3 style="margin: 0 0 8px 0; color: #1f2937; font-size: 22px;">Admin Access</h3>
            <p style="color: #555; margin: 0 0 20px 0; font-size: 15px;">Enter password to access the dashboard</p>
            
            <input type="password" id="adminPasswordInput" placeholder="Enter password"
                   style="width: 100%; padding: 14px 16px; font-size: 16px; border: 2px solid #e5e7eb; border-radius: 10px; margin-bottom: 12px; outline: none;">
            
            <!-- Error message -->
            <p id="passwordErrorMsg" style="color: #ef4444; font-size: 14px; margin: 0 0 18px 0; display: none; font-weight: 500;">
                Incorrect password. Please try again.
            </p>
            
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button onclick="cancelAdminAccess()"
                        style="flex: 1; background: #6b7280; color: white; padding: 13px 0; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 500; transition: background 0.2s;">
                    Cancel
                </button>
                <button onclick="verifyAdminPassword()"
                        style="flex: 1; background: #d32f2f; color: white; padding: 13px 0; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 500; transition: background 0.2s;">
                    Submit
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <!-- Admin password functions -->
    <script>
        const ADMIN_PASSWORD = "pizza123";

        function checkAdminAccess() {
            document.getElementById("adminAccessModal").style.display = "flex";
            document.getElementById("adminPasswordInput").value = "";
            document.getElementById("passwordErrorMsg").style.display = "none";
        }

        function verifyAdminPassword() {
            const input = document.getElementById("adminPasswordInput").value;
            const errorMsg = document.getElementById("passwordErrorMsg");
            
            if (input === ADMIN_PASSWORD) {
                window.location.href = "admin.html";
            } else {
                errorMsg.style.display = "block";
            }
        }

        function cancelAdminAccess() {
            document.getElementById("adminAccessModal").style.display = "none";
        }
    </script>
</body>
</html>
